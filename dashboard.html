<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TalentKnight — Client Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --blue: #2563eb;
      --blue-light: #eff6ff;
      --text: #0f172a;
      --muted: #64748b;
      --dim: #94a3b8;
      --green: #16a34a;
      --rose: #ef4444;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    .nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .nav-logo { font-size: 17px; font-weight: 700; color: var(--blue); letter-spacing: -0.5px; }
    .nav-logo span { color: var(--text); }
    .nav-client { font-size: 13px; color: var(--muted); font-weight: 500; }

    /* ── PAGE HEADER ── */
    .page-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      padding: 18px 28px 0;
    }
    .page-title { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }

    /* ── ROLE TABS ── */
    .role-tabs {
      display: flex;
      padding: 0 28px;
      margin-top: 10px;
      overflow-x: auto;
      gap: 2px;
    }
    .role-tab {
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.12s;
      user-select: none;
    }
    .role-tab:hover { color: var(--text); }
    .role-tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }
    .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 10px;
      margin-left: 5px;
      background: var(--bg);
      color: var(--muted);
    }
    .role-tab.active .tab-badge { background: var(--blue-light); color: var(--blue); }

    /* ── ROLE INFO BAR ── */
    .role-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 28px 12px;
      font-size: 12px;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .status-active   { background: #dcfce7; color: #166534; }
    .status-paused   { background: #fef9c3; color: #854d0e; }
    .status-filled   { background: #dbeafe; color: #1e40af; }
    .status-closed   { background: #f1f5f9; color: #475569; }
    .role-brief {
      color: var(--dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 500px;
    }

    /* ── KANBAN ── */
    .kanban-outer {
      padding: 20px 20px 60px;
    }
    .kanban-board {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      width: 100%;
    }
    .kanban-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      border-radius: 10px;
      background: #eef2f7;
      border: 1px solid #dde3ec;
      overflow: hidden;
    }
    .col-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .stage-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .stage-name {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .stage-count {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      background: var(--bg);
      padding: 1px 6px;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .col-body {
      padding: 7px;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: background 0.12s;
    }
    .col-body.drag-over {
      background: #dbeafe;
      outline: 2px dashed var(--blue);
      outline-offset: -3px;
      border-radius: 0 0 10px 10px;
    }
    .col-empty {
      padding: 20px 8px;
      text-align: center;
      color: var(--dim);
      font-size: 11px;
    }

    /* ── CANDIDATE CARDS ── */
    .cand-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px;
      cursor: grab;
      transition: box-shadow 0.12s, transform 0.12s, opacity 0.12s;
    }
    .cand-card:hover {
      box-shadow: 0 3px 10px rgba(15,23,42,0.1);
      transform: translateY(-1px);
    }
    .cand-card.dragging {
      opacity: 0.35;
      cursor: grabbing;
    }
    .card-top { display: flex; align-items: flex-start; gap: 8px; }
    .cand-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }
    .card-body { flex: 1; min-width: 0; }
    .cand-name {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cand-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      gap: 4px;
    }
    .card-loc {
      font-size: 11px;
      color: var(--dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .card-icons { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .li-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 3px;
      background: #0a66c2;
      color: white;
      font-size: 9px;
      font-weight: 800;
      text-decoration: none;
    }
    .consent-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--dim);
    }
    .consent-dot.ok { background: var(--green); }

    /* ── STATES ── */
    .centered {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 14px;
      text-align: center;
    }
    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err-title { font-size: 17px; font-weight: 600; }
    .err-msg { color: var(--rose); font-size: 14px; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">Talent<span>Knight</span></div>
  <div class="nav-client" id="navClient"></div>
</nav>

<div id="main">
  <div class="centered">
    <div class="spinner"></div>
    <div style="color:var(--muted);font-size:14px;">Loading your pipeline…</div>
  </div>
</div>

<script>
const TOKEN = new URLSearchParams(window.location.search).get('token');

const STAGES = ['Sourced','Contacted','Shortlisted','Interviewing','Offered','Placed','Rejected'];
const STAGE_CFG = {
  Sourced:      { dot: '#94a3b8', color: '#475569' },
  Contacted:    { dot: '#3b82f6', color: '#1d4ed8' },
  Shortlisted:  { dot: '#06b6d4', color: '#0e7490' },
  Interviewing: { dot: '#f59e0b', color: '#b45309' },
  Offered:      { dot: '#f97316', color: '#c2410c' },
  Placed:       { dot: '#22c55e', color: '#15803d' },
  Rejected:     { dot: '#ef4444', color: '#b91c1c' },
};

let state = null;
let roleIdx = 0;
let dragId = null;
let dragFrom = null;

async function load() {
  if (!TOKEN) return showErr('No access token', 'Check your dashboard link and try again.');
  try {
    const r = await fetch(`/api/crm?action=dashboard&token=${TOKEN}`);
    if (r.status === 401) return showErr('Access denied', 'This link is invalid or has expired.');
    if (!r.ok) return showErr('Something went wrong', 'Please try refreshing the page.');
    state = await r.json();
  } catch { return showErr('Connection error', 'Please check your connection and refresh.'); }
  render();
}

function render() {
  const { client, roles } = state;
  document.getElementById('navClient').textContent = client.name;
  document.title = `${client.name} — TalentKnight`;

  const main = document.getElementById('main');

  if (!roles.length) {
    main.innerHTML = `
      <div class="page-header"><div class="header-inner"><div class="page-title">${esc(client.name)}</div></div><div style="height:18px"></div></div>
      <div class="centered" style="min-height:50vh;">
        <div style="font-size:36px;">📋</div>
        <div style="font-size:16px;font-weight:600;">No roles yet</div>
        <div style="color:var(--muted);font-size:13px;">Your TalentKnight recruiter will set up your first role shortly.</div>
      </div>`;
    return;
  }

  roleIdx = Math.min(roleIdx, roles.length - 1);
  const role = roles[roleIdx];

  main.innerHTML = `
    <div class="page-header">
      <div class="header-inner">
        <div class="page-title">${esc(client.name)}</div>
      </div>
      <div class="role-tabs" id="roleTabs"></div>
      <div class="role-info" id="roleInfo"></div>
    </div>
    <div class="kanban-outer">
      <div class="kanban-board" id="board"></div>
    </div>`;

  // Tabs
  const tabs = document.getElementById('roleTabs');
  roles.forEach((r, i) => {
    const t = document.createElement('div');
    t.className = 'role-tab' + (i === roleIdx ? ' active' : '');
    t.innerHTML = `${esc(r.title)}<span class="tab-badge">${r.candidates.length}</span>`;
    t.onclick = () => { roleIdx = i; render(); };
    tabs.appendChild(t);
  });

  // Role info bar
  const info = document.getElementById('roleInfo');
  const statusClass = 'status-' + role.status.toLowerCase();
  info.innerHTML = `
    <span class="status-badge ${statusClass}">${esc(role.status)}</span>
    ${role.location ? `<span>📍 ${esc(role.location)}</span>` : ''}
    ${role.brief ? `<span class="role-brief" title="${esc(role.brief)}">${esc(role.brief)}</span>` : ''}`;

  buildKanban(role);
}

function buildKanban(role) {
  const board = document.getElementById('board');
  board.innerHTML = '';

  const byStage = {};
  STAGES.forEach(s => byStage[s] = []);
  role.candidates.forEach(c => {
    const s = STAGES.includes(c.pipelineStage) ? c.pipelineStage : 'Sourced';
    byStage[s].push(c);
  });

  STAGES.forEach(stage => {
    const cfg = STAGE_CFG[stage];
    const cards = byStage[stage];

    const col = document.createElement('div');
    col.className = 'kanban-col';
    col.innerHTML = `
      <div class="col-header">
        <span class="stage-dot" style="background:${cfg.dot}"></span>
        <span class="stage-name" style="color:${cfg.color}">${stage}</span>
        <span class="stage-count">${cards.length}</span>
      </div>
      <div class="col-body" data-stage="${stage}"></div>`;

    const body = col.querySelector('.col-body');

    if (!cards.length) {
      body.innerHTML = `<div class="col-empty">Drop here</div>`;
    } else {
      cards.forEach(c => body.appendChild(makeCard(c)));
    }

    body.addEventListener('dragover', e => { e.preventDefault(); body.classList.add('drag-over'); });
    body.addEventListener('dragleave', e => { if (!body.contains(e.relatedTarget)) body.classList.remove('drag-over'); });
    body.addEventListener('drop', e => {
      e.preventDefault();
      body.classList.remove('drag-over');
      if (dragId && dragFrom && dragFrom !== stage) applyStage(dragId, stage, dragFrom);
    });

    board.appendChild(col);
  });
}

function makeCard(c) {
  const card = document.createElement('div');
  card.className = 'cand-card';
  card.draggable = true;

  const bg = avatarColor(c.name);
  const ini = initials(c.name);
  const sub = [c.role, c.company].filter(Boolean).join(' · ');
  const loc = shortLoc(c.location);

  card.innerHTML = `
    <div class="card-top">
      <div class="cand-avatar" style="background:${bg}">${esc(ini)}</div>
      <div class="card-body">
        <div class="cand-name" title="${esc(c.name)}">${esc(c.name)}</div>
        ${sub ? `<div class="cand-sub" title="${esc(sub)}">${esc(sub)}</div>` : ''}
      </div>
    </div>
    <div class="card-footer">
      <span class="card-loc">${loc ? `📍 ${esc(loc)}` : ''}</span>
      <div class="card-icons">
        <span class="consent-dot${c.email ? ' ok' : ''}" title="${c.email ? 'Email available' : 'Pending consent'}"></span>
        ${c.linkedinUrl ? `<a class="li-btn" href="${escA(c.linkedinUrl)}" target="_blank" title="View on LinkedIn">in</a>` : ''}
      </div>
    </div>`;

  card.addEventListener('dragstart', e => {
    dragId = c.id;
    dragFrom = STAGES.includes(c.pipelineStage) ? c.pipelineStage : 'Sourced';
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => card.classList.add('dragging'), 0);
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    document.querySelectorAll('.col-body').forEach(b => b.classList.remove('drag-over'));
  });

  return card;
}

async function applyStage(candidateId, newStage, oldStage) {
  const role = state.roles[roleIdx];
  const cand = role.candidates.find(c => c.id === candidateId);
  if (cand) cand.pipelineStage = newStage;
  buildKanban(role);

  try {
    const r = await fetch('/api/crm?action=update-stage', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: TOKEN, candidateId, stage: newStage }),
    });
    if (!r.ok) throw new Error();
  } catch {
    if (cand) cand.pipelineStage = oldStage;
    buildKanban(role);
    alert('Stage update failed — please try again.');
  }
}

function avatarColor(name) {
  const p = ['#2563eb','#7c3aed','#db2777','#dc2626','#d97706','#059669','#0891b2','#4f46e5'];
  let h = 0;
  for (const ch of String(name)) h = (h * 31 + ch.charCodeAt(0)) & 0x7fffffff;
  return p[h % p.length];
}
function initials(name) {
  return String(name || '').split(' ').slice(0, 2).map(w => w[0] || '').join('').toUpperCase() || '?';
}
function shortLoc(loc) {
  if (!loc) return '';
  const parts = loc.split(',').map(p => p.trim());
  if (parts.length === 1) return loc;
  const cm = { 'United Kingdom':'UK','England':'UK','Scotland':'UK','Wales':'UK','Northern Ireland':'UK','United States':'US','United States of America':'US' };
  return `${parts[0]}, ${cm[parts[parts.length-1]] ?? parts[parts.length-1]}`;
}
function esc(s)  { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s) { return String(s ?? '').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function showErr(title, msg) {
  document.getElementById('main').innerHTML = `<div class="centered"><div class="err-title">${esc(title)}</div><div class="err-msg">${esc(msg)}</div></div>`;
}

load();
</script>
</body>
</html>
